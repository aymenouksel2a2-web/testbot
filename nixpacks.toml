# nixpacks.toml
[phases.setup]
nixPkgs = ["playwright"]

[phases.install]
cmds = [
    "mkdir -p /app/.playwright-browsers",
    "export PLAYWRIGHT_BROWSERS_PATH=/app/.playwright-browsers",
    "playwright install chromium",
    "playwright install-deps chromium"
]

[variables]
PLAYWRIGHT_BROWSERS_PATH = "/app/.playwright-browsers"
